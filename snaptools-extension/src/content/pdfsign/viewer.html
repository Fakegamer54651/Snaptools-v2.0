<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SnapTools PDF Viewer</title>
    <style>
      html, body { height: 100%; margin: 0; background: #f5f5f5; font-family: system-ui, Arial, sans-serif; }
      #toolbar { height: 44px; background: #fff; display: flex; align-items: center; gap: 8px; padding: 0 12px; border-bottom: 1px solid #e5e5e5; }
      #pages { height: calc(100% - 44px); overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 16px; }
      button { border: 1px solid #ddd; background: #fff; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
      button:hover { background: #f3f3f3; }
      #name { margin-left: 8px; color: #444; font-size: 13px; }
      canvas { background: white; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 16px; }
    </style>
    <!-- Load UMD PDF.js from our extension assets -->
    <script src="../../vendor/pdf.min.js"></script>
    <script>
      // Set worker from our extension assets
      (function(){
        const src = new URL('../../vendor/pdf.worker.min.js', location.href).toString();
        (window.pdfjsLib || window['pdfjs-dist/build/pdf']).GlobalWorkerOptions.workerSrc = src;
      })();
    </script>
  </head>
  <body>
    <div id="toolbar">
      <button id="prev">Prev</button>
      <button id="next">Next</button>
      <button id="zoomOut">-</button>
      <button id="zoomIn">+</button>
      <span id="pageInfo"></span>
      <span id="name"></span>
    </div>
    <div id="pages"></div>
    <script src="./viewer.js"></script>
  </body>
</html>
